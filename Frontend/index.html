  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at 50% 50%, #15152e 0%, #0b0b1a 100%);
      background-attachment: fixed;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .presentation-card {
      background: rgba(20, 20, 46, 0.88);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(161, 158, 255, 0.14);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .presentation-card:hover {
      border-color: rgba(161, 158, 255, 0.4);
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ===== Seekers revamp: design-system utilities ===== */

    /* Animated brand gradient text */
    .text-gradient {
      background-image: linear-gradient(110deg, #b8b4ff 0%, #a19eff 22%, #22d3ee 50%, #a19eff 78%, #c4b5fd 100%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: gradient-x 7s ease infinite;
      text-shadow: 0 0 38px rgba(161,158,255,0.25);
    }

    /* Scroll-reveal: hidden until .is-visible (toggled by IntersectionObserver) */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
      will-change: opacity, transform;
    }
    .reveal.is-visible { opacity: 1; transform: none; }

    /* Card sheen — a soft moving highlight on hover */
    .sheen { position: relative; overflow: hidden; }
    .sheen::after {
      content: '';
      position: absolute;
      top: 0; left: -120%;
      width: 70%; height: 100%;
      background: linear-gradient(100deg, transparent, rgba(161,158,255,0.10), transparent);
      transform: skewX(-18deg);
      transition: left 0.7s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
    }
    .sheen:hover::after { left: 140%; }

    /* Gradient hairline border for premium cards */
    .border-glow {
      border: 1px solid transparent;
      background:
        linear-gradient(rgba(20,20,46,0.9), rgba(13,13,30,0.92)) padding-box,
        linear-gradient(140deg, rgba(161,158,255,0.5), rgba(34,211,238,0.18), rgba(161,158,255,0.05)) border-box;
    }

    /* Subtle dotted grid texture for section backgrounds */
    .bg-grid {
      background-image: radial-gradient(rgba(161,158,255,0.10) 1px, transparent 1px);
      background-size: 28px 28px;
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, #000 30%, transparent 78%);
      mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, #000 30%, transparent 78%);
    }

    /* Film-grain / noise overlay for depth */
    .noise-overlay {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Fancy underline for nav links */
    .nav-underline { position: relative; }
    .nav-underline::after {
      content: '';
      position: absolute;
      left: 0; bottom: -6px;
      height: 1.5px; width: 0;
      background: linear-gradient(90deg, #a19eff, #22d3ee);
      transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .nav-underline:hover::after { width: 100%; }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
      .reveal { opacity: 1 !important; transform: none !important; }
    }
    
    /* Responsive padding for the floating header */
    main.logged-in {
      padding-top: 120px !important;
    }
    @media (min-width: 768px) {
      main.logged-in {
        padding-top: 160px !important;
      }
    }
