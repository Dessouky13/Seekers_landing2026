<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0b1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12122b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a19eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#a19eff" stroke-width="4" opacity="0.3"/>
  <!-- Seekers S Symbol - Larger and bolder -->
  <g transform="translate(96, 80) scale(1.25)">
    <!-- Main S shape -->
    <path d="M240 40c0-22.1-17.9-40-40-40H80C57.9 0 40 17.9 40 40s17.9 40 40 40h120c22.1 0 40 17.9 40 40s-17.9 40-40 40h-40c-44.2 0-80 35.8-80 80v40c0 22.1 17.9 40 40 40s40-17.9 40-40v-40c0-22.1 17.9-40 40-40h40c44.2 0 80-35.8 80-80V80c0-22.1-17.9-40-40-40z" fill="url(#symbolGrad)"/>
    <!-- Circuit nodes -->
    <circle cx="60" cy="40" r="16" fill="#a19eff"/>
    <circle cx="260" cy="280" r="16" fill="#a19eff"/>
    <!-- Circuit lines -->
    <line x1="60" y1="40" x2="20" y2="40" stroke="#a19eff" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <line x1="260" y1="280" x2="300" y2="280" stroke="#a19eff" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
